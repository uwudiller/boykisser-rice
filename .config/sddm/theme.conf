[General]
# Theme configuration for Femboy Boykisser SDDM theme

[Theme]
# Theme name
Name=Femboy Boykisser
Description=Cute pink/pastel SDDM theme
Author=Femboy Boykisser Rice
Website=
License=GPLv3
Version=1.0
MainScript=Main.qml
ConfigFile=theme.conf
Theme-Id=boykisser
Theme-API=2.0
QtVersion=6

[Colors]
# Pink/pastel color scheme
Background=#1e1e2e
Accent=#ff69b4
AccentSecondary=#ffb6c1
Text=#f8f8f2
TextSecondary=#cdd6f4
Overlay=rgba(30, 30, 46, 0.95)
InputBorder=rgba(255, 105, 180, 0.3)
InputBorderFocused=#ff69b4
InputBorderError=#ff5555
Success=#50fa7b
Warning=#ffaa00
Error=#ff5555

[Fonts]
# Font configuration
MainFont=JetBrains Mono Nerd Font
MainFontSize=12
UsernameFont=JetBrains Mono Nerd Font
UsernameFontSize=16
PasswordFont=JetBrains Mono Nerd Font
PasswordFontSize=16
ButtonFont=JetBrains Mono Nerd Font
ButtonFontSize=14

[Layout]
# Layout configuration
ScreenWidth=1920
ScreenHeight=1080
FormPosition=center
FormWidth=400
FormHeight=500
AvatarSize=128
AvatarPosition=top
AvatarRadius=64

[Background]
# Background configuration
BackgroundSource=image
BackgroundPath=/usr/share/sddm/themes/boykisser/background.png
BackgroundFillMode=preserveaspectcrop
BackgroundBlur=0
BackgroundOverlay=rgba(30, 30, 46, 0.3)

[Input]
# Input field configuration
UsernameFieldVisible=true
PasswordFieldVisible=true
RememberLastSession=true
RememberLastUser=true
AutoFocus=true
