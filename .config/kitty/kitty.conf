# 🌸 Femboy Boykisser Kitty Configuration 🌸
# Cute pink/pastel themed terminal

# Font
font_family JetBrains Mono Nerd Font
bold_font JetBrains Mono Nerd Font Bold
italic_font JetBrains Mono Nerd Font Italic
bold_italic_font JetBrains Mono Nerd Font Bold Italic
font_size 12.0

# Colors - Femboy Boykisser Theme
foreground #f8f8f2
background #1e1e2e
selection_foreground #1e1e2e
selection_background #ff69b4

# Cursor
cursor #ff69b4
cursor_text_color #1e1e2e

# URL underline
url_style curly

# Tab bar
tab_bar_style fade
tab_fade 1
active_tab_foreground #1e1e2e
active_tab_background #ff69b4
active_tab_font_style bold
inactive_tab_foreground #cdd6f4
inactive_tab_background rgba(68, 71, 90, 0.5)
inactive_tab_font_style normal

# Window borders
active_border_color #ff69b4
inactive_border_color rgba(147, 112, 219, 0.5)
bell_border_color #ff5555

# Window padding
window_padding_width 8
window_margin_width 8
single_window_margin_width -1
placement_strategy center

# Scrollback
scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# Mouse
mouse_hide_wait 3.0
url_color #ff69b4
open_url_with default

# Performance
repaint_delay 10
input_delay 3
sync_to_monitor yes

# Bell
visual_bell_duration 0.3
window_alert_on_bell yes
bell_on_tab yes

# Advanced
shell fish
editor nvim
close_on_child_death no
allow_remote_control yes
listen_on unix:/tmp/kitty

# Keybindings
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+new_tab new_tab
map ctrl+shift+w close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
map ctrl+shift+up move_tab_forward
map ctrl+shift+down move_tab_backward
map ctrl+shift+t new_tab
map ctrl+shift+q close_window
map ctrl+shift+enter launch
map ctrl+shift+f launch --location=hsplit
map ctrl+shift+d launch --location=vsplit

# Font size
map ctrl+shift+plus change_font_size all +2.0
map ctrl+shift+minus change_font_size all -2.0
map ctrl+shift+backspace change_font_size all 0

# Layouts
map ctrl+shift+1 next_layout

# Background opacity
background_opacity 0.9
dynamic_background_opacity yes

# Tab bar separator
tab_separator " ┇ "

# Window title
tab_title_template "{index}: {title}"

# Disable ligatures when cursor is on them
disable_ligatures cursor

# Startup
startup_session none

# Confirm close
confirm_os_window_close 0

# Enable shell integration
shell_integration enabled

# Hide mouse cursor when typing
hide_window_decorations yes
resize_in_steps no
