# 🌸 Femboy Boykisser Hyprland Configuration 🌸
# A cute and functional Hyprland rice with pink/pastel aesthetics

# ============================================
# MONITORS
# ============================================
monitor=eDP-1,1920x1080@60,0x0,1
# monitor=HDMI-A-1,1920x1080@60,0x0,1

# ============================================
# GENERAL SETTINGS
# ============================================
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 3
    col.active_border = rgba(255, 105, 180, 1) rgba(255, 182, 193, 1) 45deg
    col.inactive_border = rgba(147, 112, 219, 0.5)
    layout = dwindle
    resize_on_border = true
    extend_border_grab_amount = 15
    hover_icon_on_border = true
}

# ============================================
# DECORATION
# ============================================
decoration {
    rounding = 12
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        xray = true
    }
    drop_shadow = true
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(0, 0, 0, 0.25)
    dim_inactive = 0.15
    dim_strength = 0.3
}

# ============================================
# ANIMATIONS
# ============================================
animations {
    enabled = true
    bezier = easeInQuart, 0.895, 0.03, 0.685, 0.22
    bezier = easeOutQuart, 0.165, 0.84, 0.44, 1
    bezier = easeInOutQuart, 0.77, 0, 0.175, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = cuteSpring, 0.34, 1.56, 0.64, 1
    
    animation = windows, 1, 6, cuteSpring, slide
    animation = windowsOut, 1, 6, easeOutExpo, slide
    animation = windowsMove, 1, 5, cuteSpring, slide
    animation = border, 1, 10, easeOutExpo
    animation = borderangle, 1, 8, easeInOutQuart, loop
    animation = fade, 1, 8, easeOutQuart
    animation = workspaces, 1, 7, cuteSpring, slidevert
    animation = specialWorkspace, 1, 6, cuteSpring, slidevert
}

# ============================================
# INPUT
# ============================================
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
        drag_lock = true
    }
}

# ============================================
# GESTURES
# ============================================
gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
    workspace_swipe_invert = false
    workspace_swipe_min_speed_to_force = 15
    workspace_swipe_cancel_ratio = 0.11
}

# ============================================
# LAYOUTS
# ============================================
dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

master {
    new_status = master
    new_on_top = true
    no_gaps_when_only = false
}

# ============================================
# WINDOW RULES
# ============================================
windowrule = float, ^(zen-alpha)$
windowrule = size 1200 800, ^(zen-alpha)$
windowrule = center, ^(zen-alpha)$
windowrule = float, ^(pavucontrol)$
windowrule = float, ^(blueman-manager)$
windowrule = float, ^(nm-connection-editor)$
windowrule = float, ^(thunar)$
windowrule = size 800 600, ^(thunar)$
windowrule = center, ^(thunar)$
windowrule = float, ^(wofi)$
windowrule = float, ^(wlogout)$
windowrule = noborder, ^(wlogout)$
windowrule = float, ^(nemo)$
windowrule = float, ^(file-roller)$
windowrule = float, ^(org.gnome.Calculator)$
windowrule = size 400 600, ^(org.gnome.Calculator)$
windowrule = center, ^(org.gnome.Calculator)$

# ============================================
# LAYERS
# ============================================
layer-rule = blur, waybar
layer-rule = ignorealpha 0.5, waybar

# ============================================
# STARTUP
# ============================================
exec-once = ~/.config/hypr/start.sh

# ============================================
# KEYBINDINGS
# ============================================
# MOD = SUPER (Windows key)
$mod = SUPER

# System
bind = $mod, RETURN, exec, kitty
bind = $mod SHIFT, RETURN, exec, kitty --class float
bind = $mod, D, exec, wofi --show drun
bind = $mod, W, exec, zen-alpha
bind = $mod, E, exec, thunar
bind = $mod, Q, killactive
bind = $mod SHIFT, Q, exec, wlogout
bind = $mod SHIFT, E, exec, hyprctl reload
bind = $mod, F, togglefloating
bind = $mod, P, pseudo
bind = $mod, J, togglesplit
bind = $mod, T, togglespecialworkspace
bind = $mod SHIFT, T, movetoworkspacespecial, special
bind = $mod, Escape, exec, swaylock
bind = $mod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = $mod, S, exec, grim - | wl-copy
bind = $mod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
bind = $mod, X, exec, wlogout
bind = $mod, L, exec, swaylock
bind = $mod, B, exec, pkill -x waybar && waybar
bind = $mod SHIFT, B, exec, killall -q waybar
bind = $mod, R, exec, kitty --class nvim nvim
bind = $mod, N, exec, notify-send "🌸 Hello cutie!" "You're doing amazing!"
bind = $mod, O, exec, pavucontrol
bind = $mod SHIFT, O, exec, blueman-manager

# Window focus
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# Window move
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# Window resize
bind = $mod CTRL, left, resizeactive, -20 0
bind = $mod CTRL, right, resizeactive, 20 0
bind = $mod CTRL, up, resizeactive, 0 -20
bind = $mod CTRL, down, resizeactive, 0 20
bind = $mod CTRL, H, resizeactive, -20 0
bind = $mod CTRL, L, resizeactive, 20 0
bind = $mod CTRL, K, resizeactive, 0 -20
bind = $mod CTRL, J, resizeactive, 0 20

# Workspace switching
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Scroll through workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Media controls
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = SHIFT, XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%+
bind = SHIFT, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%-

# Brightness
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ============================================
# ENVIRONMENT VARIABLES
# ============================================
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = _JAVA_AWT_WM_NONREPARENTING,1
env = GTK_THEME,Adwaita:dark
env = QT_QPA_PLATFORMTHEME,qt5ct
